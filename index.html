<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signature - Friend Or Trend?</title>
    <link rel="icon" href="https://assets.friendortrend.dedyn.io/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- STARTUP SPLASH -->
    <div class="wrap" id="splashView">
      <div class="splash">
        <img class="logo" src="https://assets.friendortrend.dedyn.io/logo.png" alt="Friend Or Trend? logo" />
        <h1>Signature</h1>
        <p class="sub">Friend Or Trend?</p>
      </div>
    </div>

    <!-- LOGIN CARD -->
    <div class="wrap hidden" id="loginView">
      <div class="card">
        <img class="logo" src="https://assets.friendortrend.dedyn.io/logo.png" alt="Friend Or Trend? logo" />
        <h2>Welcome back</h2>
        <p class="lead">Sign in to create and share your quiz.</p>

        <button class="btn btn-google" id="googleBtn">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.6 13.2l7.8 6.1C12.2 13.3 17.6 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7C43.9 37.9 46.5 31.8 46.5 24.5z"/>
            <path fill="#FBBC05" d="M10.4 28.3c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8l-7.8-6.1C.9 15.8 0 19.8 0 23.5s.9 7.7 2.6 10.9l7.8-6.1z"/>
            <path fill="#34A853" d="M24 47c6.1 0 11.3-2 15-5.5l-7.4-5.7c-2 1.4-4.7 2.3-7.6 2.3-6.4 0-11.8-3.8-13.6-9.3l-7.8 6.1C6.4 42.6 14.6 47 24 47z"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <div class="divider">OR</div>

        <button class="btn btn-finb" id="finbBtn">
          <span>Fake International Bank (FINB)</span>
        </button>

        <div class="status" id="status"></div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
