@keyframes kbz{0%{transform:scale(1.07) translate(0,0)}100%{transform:scale(1.03) translate(-10px,8px)}}
.ov1{position:fixed;inset:0;z-index:1;background:linear-gradient(160deg,rgba(8,0,20,.58) 0%,rgba(14,0,30,.82) 100%)}
.ov2{position:fixed;inset:0;z-index:2;background:radial-gradient(ellipse 110% 110% at 50% 55%,transparent 30%,rgba(5,0,15,.78) 100%)}
.ov3{position:fixed;inset:0;z-index:2;box-shadow:inset 0 0 200px rgba(5,0,15,.65);pointer-events:none}
.grain{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px}
/* Orbs */
.orbs{position:fixed;inset:0;z-index:3;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(var(--bl,70px));animation:of var(--d,14s) var(--dl,0s) ease-in-out infinite alternate}
@keyframes of{0%{transform:translate(0,0) scale(1)}100%{transform:translate(var(--tx,20px),var(--ty,-25px)) scale(var(--sc,1.12))}}
/* Topbar */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:1rem 1.75rem;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(8,0,20,.72) 0%,transparent 100%);
}
.logo{height:40px;filter:brightness(0) invert(1) drop-shadow(0 0 18px var(--g-glow));cursor:pointer;transition:filter .35s,transform .35s;display:block}
a:hover .logo{filter:brightness(0) invert(1) drop-shadow(0 0 32px var(--gold));transform:scale(1.05)}
.back-link{
  display:flex;align-items:center;gap:.375rem;
  padding:.4rem 1.1rem;border-radius:100px;
  font-size:.76rem;font-weight:500;color:var(--w50);
  background:var(--w04);border:1px solid var(--border-w);
  text-decoration:none;backdrop-filter:blur(20px);
  transition:all .22s;letter-spacing:.025em;
}
.back-link:hover{color:var(--w100);background:var(--w12);border-color:var(--w25)}
.back-link svg{transition:transform .22s}
.back-link:hover svg{transform:translateX(-3px)}
/* Wrap */
.wrap{
  position:relative;z-index:10;
  width:100%;max-width:432px;
  margin:5.5rem 1.25rem 2rem;
  animation:wrapIn .65s var(--ease) both;
}
@keyframes wrapIn{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
/* Card */
.card{
  background:var(--card-bg);
  backdrop-filter:blur(44px) saturate(1.7);
  -webkit-backdrop-filter:blur(44px) saturate(1.7);
  border-radius:30px;border:1px solid var(--border-gold);
  padding:2.5rem 2.375rem 2.25rem;
  position:relative;overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.04) inset,
    0 48px 120px rgba(5,0,15,.8),
    0 0 100px rgba(120,0,200,.22),
    0 0 40px rgba(232,184,75,.05);
}
.card::before{content:"";position:absolute;top:0;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),var(--gold3),var(--gold2),transparent);opacity:.65}
.card::after{content:"";position:absolute;top:-80px;right:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(150,0,255,.18),transparent 70%);pointer-events:none}
/* Greeting */
.g-eyebrow{font-size:.65rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.55rem;display:flex;align-items:center;gap:.625rem}
.g-eyebrow::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--g-glow),transparent);opacity:.55}
.g-headline{font-family:"Playfair Display",serif;font-size:clamp(1.7rem,4vw,2.15rem);font-weight:600;line-height:1.22;letter-spacing:-.025em;color:var(--w100);margin-bottom:2rem}
.g-headline em{font-style:italic;color:var(--gold2);font-weight:500}
/* Tabs */
.tabs{display:flex;background:rgba(8,0,20,.6);border:1px solid var(--border-w);border-radius:16px;padding:.28rem;gap:.28rem;margin-bottom:1.625rem}
.tab{flex:1;padding:.6rem;border-radius:12px;font-family:"Inter",sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--w50);transition:all .3s var(--ease);letter-spacing:.02em}
.tab.active{background:linear-gradient(135deg,#5600a6,#8c00dc);color:var(--w100);box-shadow:0 4px 22px rgba(140,0,220,.55),0 0 0 1px rgba(255,255,255,.1) inset}
.tab:not(.active):hover{color:var(--w80);background:var(--w07)}
/* Error */
.err{display:none;align-items:center;gap:.5rem;background:rgba(255,107,107,.09);border:1px solid rgba(255,107,107,.2);border-radius:12px;padding:.625rem .9rem;color:var(--err);font-size:.78rem;line-height:1.5;margin-bottom:1.125rem;animation:shake .32s ease}
.err.on{display:flex}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}
/* Fields */
.fields{display:flex;flex-direction:column;gap:1.05rem;margin-bottom:1.5rem}
.field label{display:block;font-size:.67rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--w50);margin-bottom:.45rem;transition:color .2s}
.field:focus-within label{color:var(--gold)}
.ishell{position:relative}
.finput{width:100%;padding:.85rem 1.05rem;background:var(--w07);border:1.5px solid var(--border-w);border-radius:13px;font-family:"Inter",sans-serif;font-size:.875rem;color:var(--w100);outline:none;transition:background .2s,border-color .25s,box-shadow .25s}
.finput::placeholder{color:rgba(255,255,255,.22);font-style:italic}
.finput:focus{background:rgba(255,255,255,.11);border-color:rgba(232,184,75,.55);box-shadow:0 0 0 4px rgba(232,184,75,.09),0 0 28px rgba(232,184,75,.06)}
.stroke{position:absolute;bottom:0;left:1.05rem;height:2px;width:0;background:linear-gradient(90deg,var(--gold),#b030ff);border-radius:2px;transition:width .5s var(--ease);pointer-events:none}
.finput:focus~.stroke,.finput:not(:placeholder-shown)~.stroke{width:calc(100% - 2.1rem)}
.pw-shell{position:relative}
.pw-shell .finput{padding-right:3rem}
.eye{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.25);display:flex;align-items:center;padding:.25rem;transition:color .2s}
.eye:hover{color:var(--gold)}
.clps{overflow:hidden;transition:max-height .42s var(--ease),opacity .35s ease}
.clps.shut{max-height:0!important;opacity:0;pointer-events:none}
/* Submit */
.btn-main{width:100%;min-height:54px;border:none;border-radius:15px;font-family:"Inter",sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:.5rem;color:#1a003a;background:linear-gradient(130deg,#ffe566 0%,#e8b84b 45%,#ffb347 100%);background-size:210% 210%;background-position:left center;box-shadow:0 6px 32px rgba(232,184,75,.5),0 0 60px rgba(232,184,75,.12);transition:background-position .45s ease,transform .2s,box-shadow .2s;letter-spacing:.025em}
.btn-main:hover{background-position:right center;transform:translateY(-2px);box-shadow:0 12px 44px rgba(232,184,75,.65),0 0 80px rgba(232,184,75,.2)}
.btn-main:active{transform:translateY(0)}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-main::before{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.32),transparent);transform:skewX(-18deg);transition:left .65s ease}
.btn-main:hover::before{left:140%}
.btn-main.loading .btn-lbl{display:none}
.btn-main.loading .btn-spin{display:block}
.btn-main.done{background:linear-gradient(130deg,#4ade80,#22c55e)!important;box-shadow:0 6px 30px rgba(74,222,128,.45)!important;color:#fff!important;pointer-events:none}
.btn-spin{display:none;width:19px;height:19px;border:2.5px solid rgba(26,0,58,.25);border-top-color:#1a003a;border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Divider */
.divider{display:flex;align-items:center;gap:.75rem;margin:1.375rem 0;font-size:.66rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.22)}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent)}
/* Google */
.btn-g{width:100%;min-height:52px;border:1.5px solid var(--border-w);border-radius:15px;background:var(--w07);font-family:"Inter",sans-serif;font-size:.86rem;font-weight:500;color:var(--w80);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.75rem;transition:all .25s var(--ease);letter-spacing:.01em;position:relative;overflow:hidden}
.btn-g:hover{border-color:rgba(232,184,75,.32);background:rgba(255,255,255,.11);color:var(--w100);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.3)}
.btn-g:active{transform:translateY(0)}
.btn-g:disabled{opacity:.5;cursor:not-allowed;transform:none}
/* Verify */
.vview{display:none;text-align:center;padding:.5rem 0;animation:wrapIn .5s var(--ease) both}
.v-icon{width:82px;height:82px;border-radius:50%;background:radial-gradient(circle,rgba(232,184,75,.14),rgba(120,0,200,.1));border:1px solid rgba(232,184,75,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.625rem;box-shadow:0 0 50px rgba(232,184,75,.18);animation:ipulse 2.5s ease infinite alternate}
@keyframes ipulse{from{box-shadow:0 0 20px rgba(232,184,75,.1)}to{box-shadow:0 0 70px rgba(232,184,75,.4),0 0 120px rgba(120,0,200,.18)}}
.v-title{font-family:"Playfair Display",serif;font-size:1.8rem;font-weight:600;letter-spacing:-.025em;color:var(--w100);margin-bottom:.65rem}
.v-sub{font-size:.86rem;color:var(--w50);line-height:1.7;margin-bottom:1.125rem}
.v-badge{display:inline-block;padding:.4rem 1.25rem;background:rgba(232,184,75,.1);border:1px solid rgba(232,184,75,.28);border-radius:100px;font-size:.8rem;font-weight:600;color:var(--gold);margin-bottom:1.125rem;letter-spacing:.03em}
.v-note{font-size:.71rem;color:rgba(255,255,255,.22);line-height:1.65;margin-bottom:1.625rem}
.btn-ghost{background:none;border:none;cursor:pointer;font-family:"Inter",sans-serif;font-size:.76rem;color:rgba(255,255,255,.25);text-decoration:underline;text-underline-offset:3px;transition:color .2s}
.btn-ghost:hover{color:var(--gold)}
/* Responsive */
@media(max-width:500px){
  body{overflow-y:auto;align-items:flex-start;justify-content:flex-start}
  .bg,.ov1,.ov2,.ov3,.grain{position:fixed}
  .wrap{margin:4.75rem .875rem 2rem;max-width:calc(100% - 1.75rem)}
  .card{padding:2rem 1.625rem 1.875rem;border-radius:24px}
  .g-headline{font-size:1.65rem}
  .topbar{padding:.8rem 1.125rem}
  .logo{height:34px}
}
</style>
</head>

          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <div class="vview" id="vView">
      <div class="v-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#E8B84B" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h2 class="v-title">Check your inbox</h2>
      <p class="v-sub">We sent a verification link to your email. Click it and you'll be signed in automatically.</p>
      <div class="v-badge" id="vEmail"></div>
      <p class="v-note">Can't find it? Check your spam or promotions folder.</p>
      <button class="btn-ghost" type="button" onclick="resetForm()">Use a different account</button>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  updateProfile, sendEmailVerification,
  GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// NOTE: onAuthStateChanged is intentionally NOT used here.
// It fires immediately on every page load and can cause redirect loops.
// Redirects happen only after explicit user actions below.

const app = initializeApp({
  apiKey:"AIzaSyDPK-NPgHs9CK4BnCgJNVvK9E7novNOI2w",
  authDomain:"friendortrend2.firebaseapp.com",
  projectId:"friendortrend2",
  storageBucket:"friendortrend2.firebasestorage.app",
  messagingSenderId:"405203029307",
  appId:"1:405203029307:web:497af09aa05cca3b00bb1e"
});
const auth = getAuth(app);

// Greeting
(()=>{
  const h=new Date().getHours();
  let tag,sub;
  if(h<5)       {tag="Still up?";      sub="Night owls find the best trends.";}
  else if(h<12) {tag="Good morning";   sub="Ready to set the tone for today.";}
  else if(h<17) {tag="Good afternoon"; sub="Ready to discover something new?";}
  else if(h<21) {tag="Good evening";   sub="Wonderful to have you back.";}
  else          {tag="Good night";     sub="Still curating your taste, we see.";}
  document.getElementById("geyebrow").textContent=tag;
  document.getElementById("gsub").textContent=sub;
})();

let mode="signup";
const labels={signup:"Begin your journey",signin:"Let\'s get you in"};

window.setMode=m=>{
  if(m===mode)return; mode=m;
  document.getElementById("tabUp").className="tab"+(m==="signup"?" active":"");
  document.getElementById("tabIn").className="tab"+(m==="signin"?" active":"");
  const nc=document.getElementById("nameClps");
  if(m==="signup"){nc.classList.remove("shut");nc.style.maxHeight="100px";}
  else{nc.style.maxHeight=nc.scrollHeight+"px";requestAnimationFrame(()=>nc.classList.add("shut"));}
  document.getElementById("btnLbl").textContent=labels[m];
  hideErr();
  const fb=document.getElementById("fblock");
  fb.style.cssText="transition:none;opacity:0;transform:translateY(8px)";
  requestAnimationFrame(()=>{fb.style.cssText="transition:opacity .3s ease,transform .3s ease;opacity:1;transform:translateY(0)";});
};

window.togglePw=()=>{
  const i=document.getElementById("pwIn"),show=i.type==="password";
  i.type=show?"text":"password";
  document.getElementById("eyon").style.display=show?"none":"block";
  document.getElementById("eyoff").style.display=show?"block":"none";
};

const showErr=m=>{
  document.getElementById("errTxt").textContent=m.replace("Firebase: ","").replace(/ \(auth\/.*?\)\.?/g,"");
  document.getElementById("errBox").className="err on";
};
const hideErr=()=>document.getElementById("errBox").className="err";

const setLoad=on=>{const b=document.getElementById("sBtn");b.disabled=on;b.classList.toggle("loading",on);};
const setDone=()=>{
  const b=document.getElementById("sBtn");b.disabled=true;
  b.classList.remove("loading");b.classList.add("done");
  b.innerHTML="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg>";
};

window.handleSubmit=async()=>{
  hideErr();
  const email=document.getElementById("emailIn").value.trim();
  const pw=document.getElementById("pwIn").value;
  const name=document.getElementById("nameIn").value.trim();
  if(!email){showErr("Please enter your email address.");return;}
  if(!pw){showErr("Please enter a password.");return;}
  if(pw.length<8){showErr("Password must be at least 8 characters.");return;}
  setLoad(true);
  try{
    if(mode==="signup"){
      const c=await createUserWithEmailAndPassword(auth,email,pw);
      if(name) await updateProfile(c.user,{displayName:name});
      await sendEmailVerification(c.user);
      setDone();
      setTimeout(()=>{
        document.getElementById("vEmail").textContent=email;
        document.getElementById("formView").style.display="none";
        document.getElementById("vView").style.display="block";
      },550);
    }else{
      await signInWithEmailAndPassword(auth,email,pw);
      setDone();
      setTimeout(()=>{window.location.href="index.html";},600);
    }
  }catch(e){
    showErr(e.message||"Something went wrong.");
    setLoad(false);
  }
};

window.handleGoogle=async()=>{
  hideErr();
  const b=document.getElementById("gBtn"),orig=b.innerHTML;
  b.disabled=true;
  b.innerHTML="<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"animation:spin .65s linear infinite\"><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"6\"/><line x1=\"12\" y1=\"18\" x2=\"12\" y2=\"22\"/><line x1=\"4.93\" y1=\"4.93\" x2=\"7.76\" y2=\"7.76\"/><line x1=\"16.24\" y1=\"16.24\" x2=\"19.07\" y2=\"19.07\"/><line x1=\"2\" y1=\"12\" x2=\"6\" y2=\"12\"/><line x1=\"18\" y1=\"12\" x2=\"22\" y2=\"12\"/><line x1=\"4.93\" y1=\"19.07\" x2=\"7.76\" y2=\"16.24\"/><line x1=\"16.24\" y1=\"7.76\" x2=\"19.07\" y2=\"4.93\"/></svg> Opening Google…";
  try{
    const result=await signInWithPopup(auth,new GoogleAuthProvider());
    if(result.user){
      setDone && (()=>{
        const b2=document.getElementById("sBtn");
        if(b2){b2.disabled=true;b2.classList.add("done");}
      })();
      setTimeout(()=>{window.location.href="index.html";},400);
    }
  }catch(e){
    if(e.code!=="auth/popup-closed-by-user") showErr("Google sign-in failed. Please try again.");
    b.disabled=false;b.innerHTML=orig;
  }
};

window.resetForm=()=>{
  document.getElementById("formView").style.display="block";
  document.getElementById("vView").style.display="none";
  const b=document.getElementById("sBtn");b.disabled=false;b.className="btn-main";
  b.innerHTML="<span class=\"btn-lbl\" id=\"btnLbl\">"+labels[mode]+"</span><div class=\"btn-spin\"></div>";
};

document.addEventListener("keydown",e=>{
  if(e.key==="Enter"&&document.getElementById("formView").style.display!=="none") handleSubmit();
});
</script>
</body>
</html>
